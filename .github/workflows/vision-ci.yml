name: Vision AI - CI/CD Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - "backend/vision/**"
      - ".github/workflows/vision-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/vision/**"
      - ".github/workflows/vision-ci.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/easylend-vision

jobs:
  lint-test-build:
    name: Lint, Test & Build Vision API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/vision/uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: ./backend/vision
        run: uv sync

      - name: Run Ruff (Linting)
        working-directory: ./backend/vision
        run: uv run ruff check .

      - name: Run Pytest (Unit Tests)
        working-directory: ./backend/vision
        run: uv run pytest

      # --- START DOCKER BUILD & PUSH ---
      - name: Log in to the Container registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha

      - name: Build and push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/vision
          file: ./backend/vision/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
