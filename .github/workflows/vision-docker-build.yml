name: Vision AI - CI/CD Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - "backend/vision/**"
      - ".github/workflows/vision-docker-build.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/vision/**"
      - ".github/workflows/vision-docker-build.yml"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/easylend-vision

jobs:
  lint-and-test:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/vision/uv.lock"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        working-directory: ./backend/vision
        run: uv sync

      - name: Run Ruff (Linting)
        working-directory: ./backend/vision
        run: uv run ruff check .

      - name: Run Ruff (Formatting Check)
        working-directory: ./backend/vision
        run: uv run ruff format --check .

      - name: Run Pytest (Unit Tests)
        working-directory: ./backend/vision
        run: uv run pytest

  security-scan:
    name: Security Scan (Grype)
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Grype (PR - Table Output)
        if: github.event_name == 'pull_request'
        uses: anchore/scan-action@v7
        env:
          GRYPE_CONFIG: "./.grype.yaml"
        with:
          path: "./backend/vision"
          fail-build: false
          output-format: table
          only-fixed: true

      - name: Run Grype (Main - SARIF Output)
        if: github.event_name == 'push'
        uses: anchore/scan-action@v7
        id: scan
        env:
          GRYPE_CONFIG: "./.grype.yaml"
        with:
          path: "./backend/vision"
          fail-build: false
          output-format: sarif
          only-fixed: true

      - name: Upload SARIF report
        if: github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}

  build-and-push-docker:
    name: Docker Build & Push
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Push Docker Image to GHCR
        uses: docker/build-push-action@v7
        with:
          context: ./backend/vision
          file: ./backend/vision/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
