name: easylend-vision-local

services:
  vision-api:
    build: .
    container_name: easylend_vision_local
    ports:
      - "8001:8000"
    environment:
      - VISION_API_KEY=${VISION_API_KEY}
      - SKIP_MODEL_LOADING=0
      - DETECTION_MODEL_PATH=models/detection.pt
      - SEGMENTATION_MODEL_PATH=models/segmentation.pt
    shm_size: 2gb
    mem_limit: 8g
    restart: unless-stopped
