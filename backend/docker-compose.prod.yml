name: easylend-production

services:
  api:
    image: ghcr.io/easylend-practice-enterprise/easylend-backend:latest
    container_name: easylend_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=prod
      - VISION_SERVICE_URL=${VISION_SERVICE_URL}
      - VISION_API_KEY=${VISION_API_KEY}
      - VISION_BOX_API_KEY=${VISION_BOX_API_KEY}
      - SIMULATION_API_KEY=${SIMULATION_API_KEY}
    mem_limit: 4g
    networks:
      - backend-net
    labels:
      - "com.centurylinklabs.watchtower.scope=easylend"

  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    shm_size: 256mb
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    mem_limit: 1g
    volumes:
      - redis_data:/data
    networks:
      - backend-net

  watchtower:
    image: nickfedor/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --scope easylend
    environment:
      - WATCHTOWER_SCOPE=easylend
      - TZ=Europe/Brussels
      - WATCHTOWER_NOTIFICATIONS_HOSTNAME=EasyLend-Proxmox
      # Authentication (optional for public images, but is a good practice)
      - REPO_USER=${GHCR_USERNAME}
      - REPO_PASS=${GHCR_PAT}
      # Notifications delivered securely via the .env file
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=${NTFY_WEBHOOK_URL}

volumes:
  pg_data:
  redis_data:

networks:
  backend-net:
    driver: bridge
