name: easylend-local

# ==========================================
# SHARED CONFIG (Local)
# ==========================================

x-build-config: &build-config
  context: ./api
  dockerfile: Dockerfile

x-core-env: &core-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
  ENVIRONMENT: dev
  TZ: Europe/Brussels

x-api-secrets: &api-secrets
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost:3000"]'}
  DOCS_USERNAME: ${DOCS_USERNAME}
  DOCS_PASSWORD: ${DOCS_PASSWORD}
  VISION_SERVICE_URL: ${VISION_SERVICE_URL}
  VISION_API_KEY: ${VISION_API_KEY}
  VISION_BOX_API_KEY: ${VISION_BOX_API_KEY}
  SIMULATION_API_KEY: ${SIMULATION_API_KEY}
  LOAN_MAX_CONCURRENT_PER_USER: ${LOAN_MAX_CONCURRENT_PER_USER:-2}

# ==========================================
# SERVICES
# ==========================================

services:
  migrator:
    build: *build-config
    container_name: easylend_migrator_local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *core-env
    command: alembic upgrade head
    networks:
      - backend-net
    restart: on-failure:5
    mem_limit: 512m

  api:
    build: *build-config
    container_name: easylend_api_local
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads
      # Optional: Uncomment the following line if you want live code reloading for FastAPI without rebuilding
      # - ./api/app:/app/app
    environment:
      <<: [*core-env, *api-secrets]
    mem_limit: 4g
    networks:
      - backend-net

  timeout_worker:
    build: *build-config
    container_name: easylend_timeout_worker_local
    restart: on-failure:5
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      <<: [*core-env, *api-secrets]
    command: python -m app.workers.loan_timeout_worker
    mem_limit: 512m
    networks:
      - backend-net

  overdue_worker:
    build: *build-config
    container_name: easylend_overdue_worker_local
    restart: on-failure:5
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      <<: [*core-env, *api-secrets]
    command: python -m app.workers.overdue_worker
    mem_limit: 512m
    networks:
      - backend-net

  postgres:
    image: postgres:17
    container_name: postgres_local
    restart: unless-stopped
    ports:
      - "5432:5432" # Open voor locale DB tools
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data_local:/var/lib/postgresql/data
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net
      - management-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "48050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin_data_local:/var/lib/pgadmin
    networks:
      - management-net

  redis:
    image: redis:7-alpine
    container_name: redis_cache_local
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379" # Open for local development
    mem_limit: 1g
    volumes:
      - redis_data_local:/data
    networks:
      - backend-net

volumes:
  pg_data_local:
  pgadmin_data_local:
  redis_data_local:

networks:
  backend-net:
    driver: bridge
  management-net:
    driver: bridge
